<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九天應元雷聲普化天尊玉樞寶經 - 互動注音閱讀器</title>
  <!-- Import Noto Serif TC for elegant traditional Chinese serif look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Ambient thunder/rain background effect -->
  <div class="ambient-bg" id="ambientBg"></div>
  <div class="lightning-flash" id="lightningFlash"></div>

  <div class="app-container">
    <header class="app-header">
      <h1 class="scripture-title">九天應元雷聲普化天尊玉樞寶經</h1>
      <p class="subtitle">互動式注音修持閱讀器</p>
    </header>

    <div class="main-layout">
      <!-- Sidebar Control Panel -->
      <aside class="control-panel">
        <div class="panel-section">
          <h3>閱讀設定</h3>
          <div class="control-group">
            <label class="switch-label">
              <span>注音顯示</span>
              <input type="checkbox" id="toggleZhuyin" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="control-group font-size-control">
            <div class="slider-header">
              <span>字體大小</span>
              <span id="fontSizeDisplay">中 (1.8rem)</span>
            </div>
            <input type="range" id="fontSizeRange" min="1.2" max="3.0" step="0.1" value="1.8">
          </div>
          <div class="control-group">
            <label class="switch-label">
              <span>排版方向</span>
              <button id="toggleLayout" class="btn btn-secondary">切換為橫書</button>
            </label>
          </div>
          <div class="control-group">
            <label class="switch-label">
              <span>注音編輯模式</span>
              <input type="checkbox" id="toggleEditMode">
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="panel-section">
          <h3>環境音效</h3>
          <div class="control-group" style="display: flex; flex-direction: column; gap: 8px;">
            <label for="selectAudio" style="font-size: 0.9rem; color: var(--color-text-muted);">選擇背景音：</label>
            <select id="selectAudio" style="width: 100%; background-color: #0a0a0d; color: var(--color-text-bright); border: 1px solid var(--border-gold); border-radius: 6px; padding: 8px; outline: none; font-family: var(--font-sans); cursor: pointer; font-size: 0.95rem; transition: border-color 0.2s;">
              <option value="none">無音效 (安靜閱讀)</option>
              <option value="rain">真實雨聲 (森林細雨)</option>
              <option value="forest_stream">林間小溪 (細流潺潺)</option>
            </select>
          </div>
          <div class="audio-hint" id="audioStatus">音效已關閉</div>
        </div>

        <div class="panel-section counter-section">
          <h3>功課計數器</h3>
          <div class="counter-display" id="counterVal">0</div>
          <div class="counter-actions">
            <button id="btnDec" class="btn btn-circle" title="減少一次">-</button>
            <button id="btnInc" class="btn btn-primary btn-counter-add" title="增加一次 (快捷鍵: 空白鍵)">+1 遍</button>
            <button id="btnReset" class="btn btn-danger" title="重設計數">重設</button>
          </div>
          <div class="shortcut-tip">提示：閱讀時按「空白鍵」可快速 +1</div>
        </div>

        <div class="panel-section">
          <h3>資料維護</h3>
          <button id="btnExport" class="btn btn-success btn-full">匯出校對 JSON</button>
          <button id="btnResetData" class="btn btn-danger btn-full" style="margin-top: 10px;">還原預設注音</button>
        </div>
      </aside>

      <!-- Scripture Reader Area -->
      <main class="reader-area">
        <!-- Navigation Controls -->
        <div class="reader-nav">
          <button id="btnPrevPage" class="btn btn-nav">&lt; 上一頁</button>
          <div class="page-selector-container">
            第
            <select id="pageSelect">
              <!-- Dynamically populated -->
            </select>
            / <span id="totalPages">29</span> 頁
          </div>
          <button id="btnNextPage" class="btn btn-nav">下一頁 &gt;</button>
        </div>

        <!-- Scripture Content Container -->
        <div class="scripture-paper vertical-mode" id="scriptureContent">
          <!-- Dynamically populated with columns and ruby elements -->
          <div class="loading">正在載入經文資料...</div>
        </div>

        <!-- Bottom Navigation Controls -->
        <div class="reader-nav reader-nav-bottom" style="margin-top: 15px; margin-bottom: 5px;">
          <button id="btnPrevPageBottom" class="btn btn-nav">&lt; 上一頁</button>
          <div class="page-selector-container">
            第
            <select id="pageSelectBottom">
              <!-- Dynamically populated -->
            </select>
            / <span id="totalPagesBottom">29</span> 頁
          </div>
          <button id="btnNextPageBottom" class="btn btn-nav">下一頁 &gt;</button>
        </div>

        <div class="footer-tip">
          點擊漢字可進行讀音校正 (需開啟編輯模式) • 支援左右方向鍵翻頁<br>
          <span style="font-size: 0.75rem; color: var(--color-text-muted); opacity: 0.7;">
            🎵 環境音效來源致謝：雨聲 (CC0) • 溪流聲 (由 Acclivity 錄製，CC BY-SA 3.0)
          </span>
        </div>
      </main>
    </div>
  </div>

  <!-- Zhuyin Editing Dialog (Modal Popover) -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4>校對漢字讀音</h4>
        <button class="btn-close" id="btnCancelEdit">&times;</button>
      </div>
      <div class="modal-body">
        <div class="char-preview">
          <span id="editChar" class="preview-kanji">炁</span>
          <span id="editCurrentZhuyin" class="preview-zhuyin">ㄑㄧˋ</span>
        </div>
        <div class="form-group">
          <label for="inputZhuyin">請輸入正確的注音符號 (例如 ㄑㄧˋ)：</label>
          <input type="text" id="inputZhuyin" autocomplete="off" placeholder="直接輸入注音">
        </div>
        <!-- Bopomofo helper keyboard for easy input -->
        <div class="zhuyin-keyboard">
          <div class="keyboard-row">
            <button class="key">ㄅ</button><button class="key">ㄆ</button><button class="key">ㄇ</button><button class="key">ㄈ</button>
            <button class="key">ㄉ</button><button class="key">ㄊ</button><button class="key">ㄋ</button><button class="key">ㄌ</button>
            <button class="key">ㄍ</button><button class="key">ㄎ</button><button class="key">ㄏ</button>
          </div>
          <div class="keyboard-row">
            <button class="key">ㄐ</button><button class="key">ㄑ</button><button class="key">ㄒ</button>
            <button class="key">ㄓ</button><button class="key">ㄔ</button><button class="key">ㄕ</button><button class="key">ㄖ</button>
            <button class="key">ㄗ</button><button class="key">ㄘ</button><button class="key">ㄙ</button>
          </div>
          <div class="keyboard-row">
            <button class="key font-accent">ㄧ</button><button class="key font-accent">ㄨ</button><button class="key font-accent">ㄩ</button>
            <button class="key">ㄚ</button><button class="key">ㄛ</button><button class="key">ㄜ</button><button class="key">ㄝ</button>
            <button class="key">ㄞ</button><button class="key">ㄟ</button><button class="key">ㄠ</button><button class="key">ㄡ</button>
          </div>
          <div class="keyboard-row">
            <button class="key">ㄢ</button><button class="key">ㄣ</button><button class="key">ㄤ</button><button class="key">ㄥ</button><button class="key">ㄦ</button>
            <button class="key font-tone">ˊ</button><button class="key font-tone">ˇ</button><button class="key font-tone">ˋ</button><button class="key font-tone">˙</button>
            <button class="key btn-clear">清除</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnSaveEdit" class="btn btn-primary">儲存修改</button>
        <button id="btnDeleteZhuyin" class="btn btn-danger">清除注音</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
