<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九天應元雷聲普化天尊玉樞寶經 - 互動注音閱讀器</title>
  <!-- Import Noto Serif TC for elegant traditional Chinese serif look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
/* Design System Variables */
:root {
  --bg-primary: #0a0a0d;
  --bg-secondary: #121218;
  --bg-card: rgba(22, 22, 30, 0.7);
  --color-gold: #d4af37;
  --color-gold-bright: #ffdf00;
  --color-gold-dim: #aa8e2c;
  --color-text-bright: #f5f5f7;
  --color-text-muted: #8e8e93;
  --color-accent-red: #8b0000;
  --color-accent-green: #2e7d32;
  --color-accent-blue: #1976d2;
  
  --border-gold: rgba(212, 175, 55, 0.2);
  --border-gold-hover: rgba(255, 223, 0, 0.4);
  --shadow-gold: 0 0 15px rgba(212, 175, 55, 0.15);
  --shadow-gold-bright: 0 0 25px rgba(255, 223, 0, 0.3);
  
  --font-serif: 'Noto Serif TC', 'Georgia', serif;
  --font-sans: 'Outfit', 'Inter', 'SF Pro TC', sans-serif;
}

/* Base Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  color: var(--color-text-bright);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Ambient Thunderstorm Background */
.ambient-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -2;
  background: radial-gradient(circle at 50% 50%, #151522 0%, #08080c 70%, #030305 100%);
  background-size: cover;
  transition: background 1s ease;
}

.lightning-flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  background: rgba(255, 255, 240, 0.85);
  opacity: 0;
  pointer-events: none;
}

/* Lightning animation keyframe triggerable by JavaScript */
@keyframes flash-animation {
  0% { opacity: 0; }
  10% { opacity: 0.8; }
  15% { opacity: 0.2; }
  20% { opacity: 0.9; }
  45% { opacity: 0; }
  100% { opacity: 0; }
}

.lightning-flash.flash-active {
  animation: flash-animation 0.7s ease-out;
}

/* App Container Layout */
.app-container {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* Header Styles */
.app-header {
  text-align: center;
  margin-bottom: 30px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border-gold);
}

.scripture-title {
  font-family: var(--font-serif);
  font-weight: 900;
  font-size: 2.2rem;
  color: var(--color-gold);
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
  letter-spacing: 0.15rem;
  margin-bottom: 5px;
}

.subtitle {
  font-size: 1rem;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3rem;
}

/* Main Layout Grid */
.main-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 30px;
  align-items: start;
}

@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr;
    gap: 15px;
  }
  
  .app-container {
    padding: 10px;
  }
  
  .control-panel {
    padding: 12px;
  }
  
  .panel-section {
    margin-bottom: 12px;
    padding-bottom: 10px;
  }
  
  .counter-display {
    font-size: 3.2rem;
    margin: 5px 0;
  }
  
  .scripture-paper {
    padding: 20px 15px;
  }
}

/* Control Panel (Sidebar) */
.control-panel {
  background-color: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow-gold);
  backdrop-filter: blur(10px);
}

.panel-section {
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 1px dashed rgba(212, 175, 55, 0.15);
}

.panel-section:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.panel-section h3 {
  font-family: var(--font-serif);
  color: var(--color-gold);
  font-size: 1.1rem;
  margin-bottom: 15px;
  letter-spacing: 0.1rem;
  display: flex;
  align-items: center;
}

.panel-section h3::after {
  content: '';
  flex-grow: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(212, 175, 55, 0.4), transparent);
  margin-left: 10px;
}

.control-group {
  margin-bottom: 12px;
}

/* Switch & Controls */
.switch-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  font-size: 0.95rem;
  color: var(--color-text-bright);
  user-select: none;
}

/* Toggle switches style */
input[type="checkbox"] {
  display: none;
}

.slider {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
  background-color: #3a3a4c;
  border-radius: 34px;
  transition: 0.3s;
}

.slider::before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: var(--color-text-bright);
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background-color: var(--color-gold-dim);
  box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
}

input:checked + .slider::before {
  transform: translateX(22px);
  background-color: var(--color-gold-bright);
}

/* Chanting Counter Panel */
.counter-section {
  text-align: center;
}

.counter-display {
  font-family: var(--font-sans);
  font-size: 4rem;
  font-weight: 300;
  color: var(--color-gold-bright);
  text-shadow: 0 0 15px rgba(255, 223, 0, 0.4);
  margin: 10px 0;
  letter-spacing: -0.05rem;
}

.counter-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  margin-bottom: 10px;
}

.shortcut-tip {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin-top: 8px;
}

.audio-hint {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin-top: 5px;
  text-align: right;
  font-style: italic;
}

/* Buttons style */
.btn {
  font-family: var(--font-sans);
  font-weight: 600;
  border-radius: 6px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  outline: none;
  font-size: 0.9rem;
}

.btn-full {
  width: 100%;
  padding: 10px 15px;
}

.btn-primary {
  background-color: var(--color-gold-dim);
  color: #000;
  border-color: var(--color-gold);
}

.btn-primary:hover {
  background-color: var(--color-gold-bright);
  box-shadow: var(--shadow-gold-bright);
}

.btn-secondary {
  background-color: rgba(255, 255, 255, 0.08);
  color: var(--color-text-bright);
  border-color: rgba(255, 255, 255, 0.15);
  padding: 6px 12px;
}

.btn-secondary:hover {
  background-color: rgba(255, 255, 255, 0.15);
}

.btn-danger {
  background-color: rgba(139, 0, 0, 0.2);
  color: #ff8888;
  border-color: rgba(139, 0, 0, 0.4);
  padding: 6px 12px;
}

.btn-danger:hover {
  background-color: rgba(139, 0, 0, 0.4);
}

.btn-success {
  background-color: rgba(46, 125, 50, 0.2);
  color: #81c784;
  border-color: rgba(46, 125, 50, 0.4);
}

.btn-success:hover {
  background-color: rgba(46, 125, 50, 0.4);
}

.btn-circle {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  background-color: rgba(255, 255, 255, 0.08);
  color: var(--color-text-bright);
  border-color: rgba(255, 255, 255, 0.15);
}

.btn-circle:hover {
  background-color: rgba(255, 255, 255, 0.15);
}

.btn-counter-add {
  padding: 10px 24px;
  font-size: 1.1rem;
}

/* Reader Area */
.reader-area {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 150px);
  min-height: 550px;
}

@media (max-width: 900px) {
  .reader-area {
    height: auto;
  }
}

.reader-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  background-color: rgba(255, 255, 255, 0.03);
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.btn-nav {
  background-color: var(--bg-card);
  color: var(--color-text-bright);
  border-color: var(--border-gold);
  padding: 8px 16px;
}

.btn-nav:hover {
  border-color: var(--color-gold-bright);
  color: var(--color-gold-bright);
}

.page-selector-container {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.95rem;
  color: var(--color-text-muted);
}

#pageSelect, #pageSelectBottom {
  background-color: #121218;
  color: var(--color-text-bright);
  border: 1px solid var(--border-gold);
  border-radius: 4px;
  padding: 4px 8px;
  outline: none;
  font-family: var(--font-sans);
  font-size: 0.95rem;
  cursor: pointer;
}

#pageSelect:focus, #pageSelectBottom:focus {
  border-color: var(--color-gold-bright);
}

/* Scripture Paper - The Reading Material */
.scripture-paper {
  flex-grow: 1;
  background: #0f0e0c url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect fill="%230f0e0c" width="100" height="100"/><circle cx="50" cy="50" r="1.5" fill="%231a1916"/></svg>') repeat;
  border: 2px solid var(--color-gold-dim);
  border-radius: 8px;
  padding: 30px 40px;
  overflow: auto;
  box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8), 0 5px 25px rgba(0, 0, 0, 0.5);
  position: relative;
  transition: all 0.3s ease;
  user-select: none;
}

/* Vertical and Horizontal Mode layouts */
.scripture-paper.vertical-mode {
  writing-mode: vertical-rl;
  text-orientation: upright;
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-start;
  align-content: flex-start;
  gap: 24px;
  line-height: 2.2;
}

.scripture-paper.horizontal-mode {
  writing-mode: horizontal-tb;
  display: block;
  line-height: 2.5;
}

/* Loading placeholder */
.loading {
  font-family: var(--font-serif);
  color: var(--color-text-muted);
  font-size: 1.2rem;
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  writing-mode: horizontal-tb;
}

/* Vertical Columns */
.scripture-column {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
}

.horizontal-mode .scripture-column {
  display: inline;
}

/* Punctuation styles */
.scripture-char.punctuation {
  color: var(--color-text-muted);
  opacity: 0.7;
}

/* Ruby Text & Character Alignment styling */
.scripture-char {
  font-family: var(--font-serif);
  font-size: var(--scripture-font-size, 1.8rem);
  font-weight: 500;
  display: inline-block;
  cursor: default;
  transition: color 0.15s ease, transform 0.15s ease;
  color: #ece6d8;
  position: relative;
  text-align: center;
}

/* Layout modifications for horizontal reading */
.horizontal-mode .scripture-char {
  font-size: var(--scripture-font-size, 1.8rem);
  margin-right: 12px;
}

.scripture-char:hover {
  color: var(--color-gold-bright);
}

/* Styling for Edit Mode clickable state */
.edit-active .scripture-char:not(.punctuation) {
  cursor: pointer;
  border-bottom: 1px dashed var(--color-gold);
}

.edit-active .scripture-char:not(.punctuation):hover {
  background-color: rgba(212, 175, 55, 0.15);
  transform: scale(1.05);
  box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
  border-radius: 4px;
}

/* Ruby Tag (Zhuyin) layout rules */
ruby {
  ruby-position: over; /* Horizontal */
  ruby-align: center;
}

/* Firefox / Safari support */
.vertical-mode ruby {
  ruby-position: right; /* Vertical right side */
}

rt {
  font-family: var(--font-serif);
  font-size: 0.38em;
  font-weight: 400;
  color: var(--color-gold-dim);
  letter-spacing: -0.02rem;
  user-select: none;
  transition: opacity 0.2s ease;
}

.vertical-mode rt {
  writing-mode: horizontal-tb;
  text-orientation: mixed;
  display: inline-block;
  padding-left: 4px;
}

.horizontal-mode ruby {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  vertical-align: middle;
}

.horizontal-mode rt {
  writing-mode: horizontal-tb;
  text-orientation: mixed;
  display: inline-block;
  padding-left: 3px;
}

/* Hide zhuyin trigger class */
.hide-zhuyin rt {
  opacity: 0;
  visibility: hidden;
}

/* Footer layout */
.footer-tip {
  text-align: center;
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin-top: 15px;
  letter-spacing: 0.05rem;
}

/* Modal dialog popup overlay */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-color: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(5px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background-color: var(--bg-secondary);
  border: 1px solid var(--color-gold);
  border-radius: 12px;
  width: 480px;
  max-width: 90%;
  box-shadow: var(--shadow-gold-bright);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modal-enter 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes modal-enter {
  0% { transform: scale(0.9) translateY(20px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

.modal-header {
  padding: 15px 20px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h4 {
  font-family: var(--font-serif);
  color: var(--color-gold-bright);
  font-size: 1.1rem;
  letter-spacing: 0.05rem;
}

.btn-close {
  background: none;
  border: none;
  color: var(--color-text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  transition: color 0.15s;
}

.btn-close:hover {
  color: var(--color-text-bright);
}

.modal-body {
  padding: 20px;
}

.char-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
  background-color: rgba(255, 255, 255, 0.02);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.preview-kanji {
  font-family: var(--font-serif);
  font-size: 3rem;
  color: var(--color-text-bright);
}

.preview-zhuyin {
  font-family: var(--font-serif);
  font-size: 1.8rem;
  color: var(--color-gold);
}

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 0.9rem;
  color: var(--color-text-muted);
  margin-bottom: 8px;
}

#inputZhuyin {
  width: 100%;
  padding: 10px 12px;
  background-color: #0a0a0d;
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 6px;
  color: var(--color-text-bright);
  font-family: var(--font-serif);
  font-size: 1.2rem;
  outline: none;
  letter-spacing: 0.1rem;
  transition: border-color 0.2s;
}

#inputZhuyin:focus {
  border-color: var(--color-gold-bright);
  box-shadow: 0 0 5px rgba(255, 223, 0, 0.2);
}

/* Bopomofo helper keyboard grid */
.zhuyin-keyboard {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: 15px;
}

.keyboard-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}

.key {
  background-color: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--color-text-bright);
  border-radius: 4px;
  padding: 6px 0;
  flex-grow: 1;
  font-family: var(--font-serif);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  min-width: 28px;
  text-align: center;
}

.key:hover {
  background-color: rgba(212, 175, 55, 0.2);
  border-color: var(--color-gold);
  color: var(--color-gold-bright);
}

.key.font-accent {
  background-color: rgba(25, 118, 210, 0.15);
  border-color: rgba(25, 118, 210, 0.3);
}

.key.font-tone {
  background-color: rgba(139, 0, 0, 0.15);
  border-color: rgba(139, 0, 0, 0.3);
  color: #ff8888;
}

.key.btn-clear {
  background-color: rgba(255, 255, 255, 0.1);
  font-size: 0.8rem;
  flex-grow: 2;
}

.modal-footer {
  padding: 15px 20px;
  border-top: 1px solid rgba(212, 175, 55, 0.2);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.modal-footer .btn {
  padding: 8px 16px;
}

/* --- Traditional Zhuyin Tone Layout System --- */
.zhuyin-wrapper {
  display: inline-flex;
}

/* 二三四聲：注音字母在左（垂直排），聲調符號在右 */
.zhuyin-wrapper.tone-normal-layout {
  flex-direction: row;
  align-items: center;
  justify-content: center;
}

/* 輕聲：聲調符號在最上方，注音字母在下方 */
.zhuyin-wrapper.tone-light-layout {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

.zhuyin-letters {
  writing-mode: vertical-rl;
  text-orientation: upright;
  line-height: 1.0;
  letter-spacing: 0.05em;
}

.zhuyin-tone {
  font-family: var(--font-serif);
  font-size: 0.85em; /* 聲調稍微縮小配合比例 */
  line-height: 1.0;
  user-select: none;
}

/* 二三四聲微調：讓聲調向左貼近，且縱向微幅偏上（符合台灣教科書習慣） */
.zhuyin-wrapper.tone-normal-layout .zhuyin-tone {
  margin-left: -1px;
  margin-top: -0.45em;
}

/* 輕聲微調：讓小圓點貼近首字頭頂 */
.zhuyin-wrapper.tone-light-layout .zhuyin-tone {
  margin-bottom: -1px;
  line-height: 0.5;
  font-size: 0.8em;
}

/* Range input font-size slider UI */
.font-size-control {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.slider-header {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  color: var(--color-text-muted);
}

#fontSizeDisplay {
  color: var(--color-gold-bright);
  font-weight: 600;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  background: #2e2e3e;
  border-radius: 3px;
  outline: none;
  margin: 8px 0;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--color-gold-bright);
  border: 1px solid var(--color-gold);
  box-shadow: 0 0 5px rgba(255, 223, 0, 0.5);
  transition: transform 0.1s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.25);
}

/* Collapsible Sections in Sidebar */
.panel-section.collapsible .collapsible-trigger {
  cursor: pointer;
  user-select: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0;
  transition: color 0.2s ease;
}

.panel-section.collapsible .collapsible-trigger:hover {
  color: var(--color-gold-bright);
}

.panel-section.collapsible .collapsible-trigger::after {
  display: none;
}

.panel-section.collapsible .arrow {
  font-size: 0.75rem;
  color: var(--color-gold-dim);
  transition: transform 0.3s ease, color 0.3s ease;
  display: inline-block;
}

.panel-section.collapsible .collapsible-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  padding-top: 0;
  transition: max-height 0.3s ease-out, opacity 0.2s ease-out, padding 0.3s ease-out;
}

.panel-section.collapsible.active .collapsible-content {
  max-height: 400px;
  opacity: 1;
  padding-top: 15px;
}

.panel-section.collapsible.active .arrow {
  transform: rotate(90deg);
  color: var(--color-gold-bright);
}

/* Back to Top Button */
.back-to-top-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background-color: rgba(22, 22, 30, 0.85);
  border: 1px solid var(--border-gold);
  color: var(--color-gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-gold);
  z-index: 99;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  outline: none;
}

.back-to-top-btn.visible {
  opacity: 1;
  visibility: visible;
}

.back-to-top-btn .arrow-svg {
  width: 20px;
  height: 20px;
  stroke: var(--color-gold);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), stroke 0.3s ease;
}

.back-to-top-btn:hover {
  background-color: var(--bg-secondary);
  border-color: var(--color-gold-bright);
  box-shadow: var(--shadow-gold-bright);
  transform: translateY(-4px);
}

.back-to-top-btn:hover .arrow-svg {
  transform: translateY(-2px);
  stroke: var(--color-gold-bright);
}

</style>
</head>

// Fetch structured scripture data
async function loadScriptureData() {
  try {
    scriptureData = EMBEDDED_DATA;
    totalPages = scriptureData.length;
    totalPagesSpan.textContent = totalPages;
    
    // Populate page select dropdown
    pageSelect.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i;
      pageSelect.appendChild(opt);
    }
    
    currentPage = 1;
    pageSelect.value = currentPage;
    renderPage();
  } catch (error) {
    scriptureContent.innerHTML = `<div class="loading" style="color: #ff8888;">載入失敗: ${error.message}</div>`;
  }
}

/* --- Zhuyin Tone Parser --- */
function parseZhuyin(zhuyinStr) {
  if (!zhuyinStr) return { letters: "", tone: "", toneClass: "tone-first" };
  
  let letters = zhuyinStr;
  let tone = "";
  let toneClass = "tone-first";
  
  if (zhuyinStr.includes("˙")) {
    tone = "˙";
    letters = zhuyinStr.replace("˙", "");
    toneClass = "tone-light";
  } else if (zhuyinStr.includes("ˊ")) {
    tone = "ˊ";
    letters = zhuyinStr.replace("ˊ", "");
    toneClass = "tone-second";
  } else if (zhuyinStr.includes("ˇ")) {
    tone = "ˇ";
    letters = zhuyinStr.replace("ˇ", "");
    toneClass = "tone-third";
  } else if (zhuyinStr.includes("ˋ")) {
    tone = "ˋ";
    letters = zhuyinStr.replace("ˋ", "");
    toneClass = "tone-fourth";
  }
  
  return { letters, tone, toneClass };
}

/* --- Render Page Content --- */

  const pageObj = scriptureData.find(p => p.page === currentPage);
  if (!pageObj) return;
  
  // Sync page selector dropdowns
  pageSelect.value = currentPage;
  if (pageSelectBottom) pageSelectBottom.value = currentPage;
  
  scriptureContent.innerHTML = '';
  
  // Apply visual settings classes
  if (isVertical) {
    scriptureContent.className = 'scripture-paper vertical-mode';
  } else {
    scriptureContent.className = 'scripture-paper horizontal-mode';
  }
  
  if (!showZhuyin) {
    scriptureContent.classList.add('hide-zhuyin');
  }
  
  if (isEditMode) {
    scriptureContent.classList.add('edit-active');
  }

      const charSpan = document.createElement('span');

      const char = charObj.char;
      const isPunc = "，。、；：！？「」『』()（）".includes(char);
      
      if (isPunc) {
        charSpan.classList.add('punctuation');
        charSpan.textContent = char;

        // Retrieve edited zhuyin if exists, otherwise default
        const editKey = `${currentPage}_${colIdx}_${charIdx}`;
        let zhuyin = charObj.zhuyin;
        if (editedZhuyinMap[editKey] !== undefined) {
          zhuyin = editedZhuyinMap[editKey];
        }
        
        // Wrap character in ruby tag for zhuyin display
        if (zhuyin) {
          const ruby = document.createElement('ruby');
          ruby.textContent = char;
          const rt = document.createElement('rt');
          
          const parsed = parseZhuyin(zhuyin);
          if (parsed.toneClass === 'tone-light') {
            rt.innerHTML = `
              <span class="zhuyin-wrapper tone-light-layout">
                <span class="zhuyin-tone tone-light">˙</span>
                <span class="zhuyin-letters">${parsed.letters}</span>
              </span>
            `;
          } else if (parsed.tone) {
            rt.innerHTML = `
              <span class="zhuyin-wrapper tone-normal-layout">
                <span class="zhuyin-letters">${parsed.letters}</span>
                <span class="zhuyin-tone">${parsed.tone}</span>
              </span>
            `;
          } else {
            rt.innerHTML = `
              <span class="zhuyin-wrapper tone-first-layout">
                <span class="zhuyin-letters">${parsed.letters}</span>
              </span>
            `;
          }
          
          ruby.appendChild(rt);
          charSpan.appendChild(ruby);
        } else {
          charSpan.textContent = char;
        }
        
        // Setup editing interaction
        charSpan.addEventListener('click', (e) => {
          if (isEditMode) {
            e.stopPropagation();
            openEditModal(currentPage, colIdx, charIdx, char, zhuyin);
          }
        });
      }
      
      colDiv.appendChild(charSpan);
    });
    
    scriptureContent.appendChild(colDiv);
  });
}

/* --- Setup Event Listeners --- */
function setupEventListeners() {
  // Navigation
  btnPrevPage.addEventListener('click', navigatePrev);
  btnNextPage.addEventListener('click', navigateNext);
  pageSelect.addEventListener('change', (e) => {
    currentPage = parseInt(e.target.value);
    renderPage();
  });
  
  if (btnPrevPageBottom) btnPrevPageBottom.addEventListener('click', navigatePrev);
  if (btnNextPageBottom) btnNextPageBottom.addEventListener('click', navigateNext);
  if (pageSelectBottom) {
    pageSelectBottom.addEventListener('change', (e) => {
      currentPage = parseInt(e.target.value);
      renderPage();
    });
  }
  
  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    // Disable navigation if user is entering text in modal
    if (document.activeElement === inputZhuyin) return;
    
    if (e.key === 'ArrowLeft') {
      if (isVertical) {
        navigateNext(); // Vertical read right-to-left, next is left
      } else {
        navigatePrev(); // Horizontal read left-to-right, prev is left
      }
    } else if (e.key === 'ArrowRight') {
      if (isVertical) {
        navigatePrev();
      } else {
        navigateNext();
      }
    } else if (e.key === ' ' || e.key === 'Spacebar') {
      // Spacebar adds counter
      e.preventDefault();
      incrementCounter();
    }
  });
  
  // Font size control
  fontSizeRange.addEventListener('input', (e) => {
    const size = parseFloat(e.target.value);
    updateFontSize(size);
    localStorage.setItem('yushu_font_size', size);
  });
  
  // Toggle controls
  toggleZhuyin.addEventListener('change', (e) => {
    showZhuyin = e.target.checked;
    if (showZhuyin) {
      scriptureContent.classList.remove('hide-zhuyin');
    } else {
      scriptureContent.classList.add('hide-zhuyin');
    }
  });
  
  toggleLayout.addEventListener('click', () => {
    isVertical = !isVertical;
    if (isVertical) {
      toggleLayout.textContent = '切換為橫書';
    } else {
      toggleLayout.textContent = '切換為直書';
    }
    renderPage();
  });
  
  toggleEditMode.addEventListener('change', (e) => {
    isEditMode = e.target.checked;
    if (isEditMode) {
      scriptureContent.classList.add('edit-active');
    } else {
      scriptureContent.classList.remove('edit-active');
    }
  });
  
  // Chanting Counter
  btnInc.addEventListener('click', incrementCounter);
  btnDec.addEventListener('click', decrementCounter);
  btnReset.addEventListener('click', resetCounter);
  
  // Export and reset
  btnExport.addEventListener('click', exportEdits);
  btnResetData.addEventListener('click', resetAllEdits);
  
  // Ambient Audio disabled in offline mode
  
  // Modal buttons
  btnCancelEdit.addEventListener('click', closeEditModal);
  btnSaveEdit.addEventListener('click', saveZhuyinEdit);
  btnDeleteZhuyin.addEventListener('click', deleteZhuyinEdit);
  
  // Close modal when clicking overlay
  editModal.addEventListener('click', (e) => {
    if (e.target === editModal) {
      closeEditModal();
    }
  });
  
  // Back to top scroll and click events
  window.addEventListener('scroll', handleScroll);
  if (scriptureContent) {
    scriptureContent.addEventListener('scroll', handleScroll);
  }
  if (btnBackToTop) {
    btnBackToTop.addEventListener('click', scrollToTop);
  }
}

function navigatePrev() {
  if (currentPage > 1) {
    currentPage--;
    pageSelect.value = currentPage;
    renderPage();
  }
}

function navigateNext() {
  if (currentPage < totalPages) {
    currentPage++;
    pageSelect.value = currentPage;
    renderPage();
  }
}

function updateFontSize(size) {
  scriptureContent.style.setProperty('--scripture-font-size', `${size}rem`);
  
  let label = '中';
  if (size < 1.6) label = '小';
  else if (size >= 1.6 && size < 2.2) label = '中';
  else if (size >= 2.2 && size < 2.7) label = '大';
  else label = '特大';
  
  fontSizeDisplay.textContent = `${label} (${size.toFixed(1)}rem)`;
}

/* --- Chanting Counter Logic --- */
function incrementCounter() {
  chantCount++;
  localStorage.setItem('yushu_chant_count', chantCount);
  counterVal.textContent = chantCount;
  
  // Trigger bounce animation on counter display
  counterVal.style.transform = 'scale(1.2)';
  counterVal.style.color = '#ffffff';
  setTimeout(() => {
    counterVal.style.transform = 'scale(1)';
    counterVal.style.color = 'var(--color-gold-bright)';
  }, 200);
  
  // Play chime sound
  playChime();
}

function decrementCounter() {
  if (chantCount > 0) {
    chantCount--;
    localStorage.setItem('yushu_chant_count', chantCount);
    counterVal.textContent = chantCount;
  }
}

function resetCounter() {
  if (confirm('確定要將念誦次數重設歸零嗎？')) {
    chantCount = 0;
    localStorage.setItem('yushu_chant_count', chantCount);
    counterVal.textContent = chantCount;
  }
}

/* --- Zhuyin Edit Modal Logic --- */
function openEditModal(page, colIdx, charIdx, char, zhuyin) {
  activeEditInfo = { page, colIdx, charIdx, char };
  
  editChar.textContent = char;
  editCurrentZhuyin.textContent = zhuyin ? zhuyin : '(無注音)';
  inputZhuyin.value = zhuyin ? zhuyin : '';
  
  editModal.classList.add('open');
  inputZhuyin.focus();
}

function closeEditModal() {
  editModal.classList.remove('open');
  activeEditInfo = null;
}

function saveZhuyinEdit() {
  if (!activeEditInfo) return;
  
  const val = inputZhuyin.value.trim().replace(/\s+/g, '');
  const key = `${activeEditInfo.page}_${activeEditInfo.colIdx}_${activeEditInfo.charIdx}`;
  
  editedZhuyinMap[key] = val;
  localStorage.setItem('yushu_edited_zhuyin', JSON.stringify(editedZhuyinMap));
  
  renderPage();
  closeEditModal();
}

function deleteZhuyinEdit() {
  if (!activeEditInfo) return;
  
  const key = `${activeEditInfo.page}_${activeEditInfo.colIdx}_${activeEditInfo.charIdx}`;
  
  editedZhuyinMap[key] = ""; // empty means no zhuyin
  localStorage.setItem('yushu_edited_zhuyin', JSON.stringify(editedZhuyinMap));
  
  renderPage();
  closeEditModal();
}

// Reset all customized edits
function resetAllEdits() {
  if (confirm('確定要清除所有手動校正的注音，恢復到 PDF 原始的注音嗎？')) {
    editedZhuyinMap = {};
    localStorage.removeItem('yushu_edited_zhuyin');
    renderPage();
  }
}

// Export JSON file with customizations merged
function exportEdits() {
  // Create a deep copy of the original dataset, apply edits, and export
  const exportData = scriptureData.map(pageObj => {
    const pageNum = pageObj.page;
    const colsCopy = pageObj.columns.map((col, colIdx) => {
      return col.map((charObj, charIdx) => {
        const key = `${pageNum}_${colIdx}_${charIdx}`;
        let finalZhuyin = charObj.zhuyin;
        if (editedZhuyinMap[key] !== undefined) {
          finalZhuyin = editedZhuyinMap[key];
        }
        return {
          char: charObj.char,
          zhuyin: finalZhuyin
        };
      });
    });
    return {
      page: pageNum,
      columns: colsCopy
    };
  });
  
  const jsonStr = JSON.stringify(exportData, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = '九天應元雷聲普化天尊玉樞寶經_已校對.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Bopomofo helper keyboard click logic
function setupKeyboardHelper() {
  const keys = document.querySelectorAll('.zhuyin-keyboard .key');
  keys.forEach(keyBtn => {
    keyBtn.addEventListener('click', () => {
      const text = keyBtn.textContent;
      if (keyBtn.classList.contains('btn-clear')) {
        inputZhuyin.value = '';
      } else {
        inputZhuyin.value += text;
      }
      inputZhuyin.focus();
    });
  });
}

/* --- Audio System (Using locally hosted nature sounds) --- */
let bgAudio = null;
let muyuInterval = null;

// Synthesis of the wooden fish (muyu) block sound
function playMuyuSound() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      return;
    }
  }
  
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  
  const now = audioCtx.currentTime;
  const freq = 560; // fundamental resonance frequency of temple block
  
  // Principal resonance body (sine wave with pitch bend down on mallet impact)
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.88, now + 0.08);
  
  gainNode.gain.setValueAtTime(0.4, now);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
  
  // Mallet impact sound (wood clack transient, high frequency, very short)
  const oscHigh = audioCtx.createOscillator();
  const gainHigh = audioCtx.createGain();
  oscHigh.type = 'sine';
  oscHigh.frequency.setValueAtTime(freq * 1.8, now);
  
  gainHigh.gain.setValueAtTime(0.12, now);
  gainHigh.gain.exponentialRampToValueAtTime(0.0001, now + 0.025);
  
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  oscHigh.connect(gainHigh);
  gainHigh.connect(audioCtx.destination);
  
  osc.start(now);
  osc.stop(now + 0.15);
  
  oscHigh.start(now);
  oscHigh.stop(now + 0.05);
}

function startMuyu() {
  stopMuyu(); // stop any active loop
  
  playMuyuSound(); // play immediately
  
  // Loop every 1.25 seconds (around 48 BPM, solemn chanting tempo)
  muyuInterval = setInterval(() => {
    playMuyuSound();
  }, 1250);
}

function stopMuyu() {
  if (muyuInterval) {
    clearInterval(muyuInterval);
    muyuInterval = null;
  }
}

function changeBgAudio(type) {}

// Synthesis of the sacred Buddhist temple chime/bowl sound
function playChime() {
  // Use Web Audio API only for the instant chime feedback
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      return;
    }
  }
  
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  
  const now = audioCtx.currentTime;
  const frequencies = [280, 420, 560, 765, 1020];
  const gains = [0.10, 0.05, 0.03, 0.015, 0.008];
  
  frequencies.forEach((f, idx) => {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.value = f;
    
    gainNode.gain.setValueAtTime(gains[idx], now);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.start(now);
    osc.stop(now + 3.5);
  });
}

// Scroll detection to show/hide back-to-top button
function handleScroll() {
  const windowScroll = window.scrollY || document.documentElement.scrollTop;
  const paperScroll = scriptureContent ? scriptureContent.scrollTop : 0;
  
  if (windowScroll > 200 || paperScroll > 200) {
    btnBackToTop.classList.add('visible');
  } else {
    btnBackToTop.classList.remove('visible');
  }
}

// Scroll smooth back to top (both page window and paper area)
function scrollToTop() {
  if (scriptureContent) {
    // For mobile: Manually calculate Y offset of scriptureContent to bypass iOS Safari scrollIntoView bug
    const rect = scriptureContent.getBoundingClientRect();
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const targetY = rect.top + scrollTop;
    
    // Scroll window smoothly to the exact Y coordinate of scriptureContent
    window.scrollTo({
      top: targetY - 12, // 12px gap from top for better aesthetics
      behavior: 'smooth'
    });
    
    // For desktop: scroll internal scrollbar of the paper back to start
    scriptureContent.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
  } else {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}
